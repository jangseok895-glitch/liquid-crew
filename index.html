<!DOCTYPE html>

<style>
*{box-sizing:border-box}
body{margin:0;font-family:'Malgun Gothic',Arial,sans-serif;background:#03030c;color:white;min-width:760px}

#intro{position:fixed;inset:0;background:#03030c;display:flex;align-items:center;justify-content:center;z-index:9999;overflow:hidden}
#introVideo{position:absolute;inset:0;width:100%;height:100%;object-fit:contain;background:#03030c}
#intro:after{content:"";position:absolute;inset:0;background:rgba(0,0,0,.18)}
.intro-box{position:relative;z-index:2;text-align:center;padding:28px 48px;border-radius:28px;background:rgba(0,0,0,.35);border:1px solid rgba(120,220,255,.45);box-shadow:0 0 45px rgba(0,200,255,.65);backdrop-filter:blur(5px);transform:translateY(200px)}
.enter-btn{width:260px;height:70px;border-radius:999px;font-size:26px;font-weight:900;color:white;background:linear-gradient(135deg,#19d7ff,#8057ff,#ff3bd4);box-shadow:0 0 25px rgba(80,220,255,.9),0 0 55px rgba(155,60,255,.65);animation:pulse 1.4s infinite}
@keyframes pulse{0%{transform:scale(1)}50%{transform:scale(1.06)}100%{transform:scale(1)}}

.main{min-height:100vh;background:#03030c;padding:0 0 40px;display:flex;justify-content:center}
.poster-wrap{position:relative;width:760px;min-height:100vh;background:url('https://i.ibb.co/XRn7r4Q/2.jpg') top center/100% auto no-repeat}
.content{position:absolute;top:190px;left:50%;transform:translateX(-50%);width:620px;margin:0}
.menu-panel{padding:15px;border-radius:22px;background:rgba(3,8,25,.62);border:1px solid rgba(120,210,255,.38);box-shadow:0 0 30px rgba(0,130,255,.25)}
.menu-title{text-align:center;margin-bottom:13px;font-size:17px;color:#c8f4ff;letter-spacing:3px}
.top-menu{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:12px}
.sub-menu{display:grid;grid-template-columns:repeat(6,1fr);gap:8px}
button{cursor:pointer;border:none}
.menu-btn{border-radius:14px;font-weight:900;color:white;border:1px solid rgba(255,255,255,.25);box-shadow:0 5px 14px rgba(0,0,0,.45)}
.big-btn{height:58px;font-size:18px}
.small-btn{height:44px;font-size:16px}
.kakao{background:linear-gradient(135deg,#ffe252,#ff9f1a);color:#111}
.rule{background:linear-gradient(135deg,#333,#555)}
.pro{background:linear-gradient(135deg,#1e90ff,#7a5cff)}
.main-tier{background:linear-gradient(135deg,#00b894,#0984e3)}
.t1{background:linear-gradient(135deg,#fd79a8,#6c5ce7)}
.t2{background:linear-gradient(135deg,#ff7675,#d63031)}
.t3{background:linear-gradient(135deg,#00cec9,#0984e3)}
.t4{background:linear-gradient(135deg,#a29bfe,#6c5ce7)}

.modal{display:none;position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:1000;align-items:flex-start;justify-content:center;padding:55px 20px 20px}
.modal-box{width:760px;max-height:88vh;overflow:auto;border-radius:22px;background:linear-gradient(180deg,#101631,#050713);border:1px solid rgba(120,220,255,.45);box-shadow:0 0 35px rgba(0,180,255,.4);padding:24px}
.modal-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:15px}
.modal-head h2{margin:0;color:#9eefff}
.head-buttons{display:flex;gap:8px}
.close-btn,.normal-btn{border-radius:10px;padding:8px 13px;font-weight:900}
.normal-btn{background:#207cff;color:white}
.manager{margin-bottom:15px;color:#ffd66b;font-weight:bold}
.manager-edit{margin-left:10px;background:#444;color:white;border-radius:8px;padding:5px 9px;font-size:12px;font-weight:900}

table{width:100%;border-collapse:collapse;margin-top:10px;background:rgba(255,255,255,.04);table-layout:fixed}
th,td{border:1px solid rgba(255,255,255,.16);padding:10px;text-align:center;font-size:15px;word-break:keep-all}
th{background:rgba(70,170,255,.25);color:#bfeeff}
th:nth-child(1){width:20%}
th:nth-child(2){width:12%}
th:nth-child(3){width:18%}
th:nth-child(4){width:32%}
th:nth-child(5){width:18%}

.badge{display:inline-block;border-radius:999px;padding:5px 10px;font-size:12px;font-weight:900}
.badge-ok{background:red;color:white}
.badge-wait{background:#207cff;color:white}
.form-area{display:none;margin-top:15px;padding:15px;border-radius:16px;background:rgba(255,255,255,.07)}
input,textarea{width:100%;margin-bottom:10px;padding:12px;border-radius:10px;border:none}
textarea{min-height:75px}
.rule-modal-box{width:720px;max-height:92vh;overflow:hidden}
.rule-img{width:100%;max-height:78vh;object-fit:contain;border-radius:14px;display:block}
.mini-action{width:auto;height:30px;padding:5px 10px;border-radius:8px;font-size:12px;font-weight:900;color:white;margin:0}
.mini-action.red{background:#ff3434}
.mini-action.blue{background:#2b7cff}
.mini-action.gray{background:#777}
.action-row{display:flex;gap:5px;justify-content:center;margin-top:7px;flex-wrap:nowrap}
.edit-small{font-size:13px;color:#ddd;margin:6px 0}
.image-view-box{width:760px;max-height:90vh;overflow:auto;border-radius:18px;background:#050713;padding:18px;border:1px solid rgba(120,220,255,.45)}
.image-view-head{display:flex;justify-content:flex-end;margin-bottom:10px}
.big-image{width:100%;border-radius:12px}
</style>
</head>

<body>

  <source src="https://raw.githubusercontent.com/jangseok895-glitch/asia-ox-sound/main/%ED%81%B4%EB%A6%AD%ED%9A%A8%EA%B3%BC%EC%9D%8C.mp3" type="audio/mpeg">
</audio>

<div id="intro">
  <video id="introVideo" autoplay muted playsinline webkit-playsinline preload="auto">
    <source src="https://raw.githubusercontent.com/jangseok895-glitch/asia-ox-sound/main/%EB%A6%AC%ED%80%B4%EB%93%9C%EB%A9%94%EC%9D%B8.mp4" type="video/mp4">
  </video>

  <div class="intro-box">
    <button class="enter-btn" onclick="enterSite()">입장하기</button>
  </div>
</div>

<div class="main">
  <div class="poster-wrap">
    <div class="content">
      <div class="menu-panel">
        <div class="menu-title">LIQUID CREW MENU</div>

        <div class="top-menu">
          <button class="menu-btn big-btn kakao" onclick="window.open('https://open.kakao.com/o/gCJzBB8h')">가입문의방 들어가기</button>
          <button class="menu-btn big-btn rule" onclick="openRule()">규정 / 개요</button>
        </div>

        <div class="sub-menu">
          <button class="menu-btn small-btn pro" onclick="openTier('프로')">프로</button>
          <button class="menu-btn small-btn main-tier" onclick="openTier('강주/주')">강주/주</button>
          <button class="menu-btn small-btn t1" onclick="openTier('1군')">1군</button>
          <button class="menu-btn small-btn t2" onclick="openTier('2군')">2군</button>
          <button class="menu-btn small-btn t3" onclick="openTier('3군')">3군</button>
          <button class="menu-btn small-btn t4" onclick="openTier('4군')">4군</button>

<div class="modal" id="tierModal">
  <div class="modal-box" id="captureArea">
    <div class="modal-head">
      <h2 id="modalTitle"></h2>
      <div class="head-buttons">
        <button class="normal-btn" onclick="captureTier()">스크린샷</button>
        <button class="normal-btn" id="normalBtn" onclick="normalMode()" style="display:none">일반모드로 가기</button>
        <button class="normal-btn" id="adminTopBtn" onclick="adminLogin()">운영진 모드</button>
        <button class="close-btn" onclick="closeTierModal()">닫기</button>

    <div class="manager">
      담당자 : <span id="managerName"></span>
      <button class="manager-edit" onclick="editManager()">담당자수정</button>

    <table>
      <thead>
        <tr>
          <th>닉네임</th>
          <th>군수</th>

      <label>추가 스크린샷 1</label>
      <input id="file1" type="file" accept="image/*">

      <label>추가 스크린샷 2</label>
      <input id="file2" type="file" accept="image/*">

    </div>
  </div>
</div>

<div class="modal" id="editModal">
  <div class="modal-box">
    <div class="modal-head">
      <h2>명단 수정</h2>
      <button class="close-btn" onclick="closeEditModal()">닫기</button>
    </div>

    <input id="editNick" placeholder="닉네임">
    <input id="editRank" placeholder="군수">
    <textarea id="editNote" placeholder="비고"></textarea>

    <div class="edit-small">현재 스크린샷</div>
    <div id="editCurrentFiles"></div>

    <div class="edit-small">스크린샷 새로 올리기</div>
    <label>스크린샷 1 교체</label>
    <input id="editFile1" type="file" accept="image/*">

    <label>스크린샷 2 교체</label>
    <input id="editFile2" type="file" accept="image/*">

    <button class="menu-btn big-btn pro" style="width:100%" onclick="saveEdit()">수정 저장</button>
  </div>
</div>

<div class="modal" id="ruleModal">
  <div class="modal-box rule-modal-box">
    <div class="modal-head">
      <h2>규정 / 개요</h2>
      <button class="close-btn" onclick="closeRule()">닫기</button>
    </div>
    <img class="rule-img" src="https://i.ibb.co/QvgrXYkH/image.jpg">
  </div>
</div>

<div class="modal" id="imageModal">
  <div class="image-view-box">
    <div class="image-view-head">
      <button class="close-btn" onclick="closeImage()">닫기</button>
    </div>
    <img id="bigImage" class="big-image" src="">
  </div>
</div>

<script>
const SUPABASE_URL = "https://xyibdanmecakevhtdajl.supabase.co";
const SUPABASE_KEY = "sb_publishable_uvYqwDymxodcSdpT1zAWyg_PeVHh_ZO";
const db = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

const managerMap = {
  "프로":"케디치",
  "강주/주":"케디치 / 미정",
  "1군":"블랙",
  "2군":"블랙",
  "3군":"블랙",
  "4군":"블랙"
};

let currentTier = "";
let adminOk = false;
let editingId = null;
let editingFile1 = null;
let editingFile2 = null;

window.addEventListener("DOMContentLoaded", () => {
  const video = document.getElementById("introVideo");
  const intro = document.getElementById("intro");
  const isMobile = /Android|iPhone|iPad|iPod|KAKAOTALK/i.test(navigator.userAgent);

  if(!video) return;

  if(isMobile){
    video.style.display = "none";
    intro.style.background = "#03030c url('https://i.ibb.co/KxqK35Hx/11.jpg') center/contain no-repeat";
    return;
  }

  video.muted = true;
  video.playsInline = true;
  video.currentTime = 0;
  video.load();

  const playPromise = video.play();

  if(playPromise){
    playPromise.catch(() => {
      video.style.display = "none";
      intro.style.background = "#03030c url('https://i.ibb.co/KxqK35Hx/11.jpg') center/contain no-repeat";
    });
  }

  video.addEventListener("ended", () => {
    video.style.display = "none";
    intro.style.background = "#03030c url('https://i.ibb.co/KxqK35Hx/11.jpg') center/contain no-repeat";
  });
});

function enterSite(){
  const intro = document.getElementById("intro");
  const video = document.getElementById("introVideo");
  const sound = document.getElementById("enterSound");

  if(sound){
    sound.currentTime = 0;
    sound.play().catch(()=>{});
  }

  intro.style.opacity = "0";
  intro.style.transition = ".6s";

  setTimeout(()=>{
    intro.style.display = "none";
    if(video) video.pause();
  },600);
}

window.onpopstate = function(){
  closeTopModal();
};

function pushStep(){
  history.pushState({modal:true},"");
}

function closeTopModal(){
  if(document.getElementById("imageModal").style.display==="flex") return closeImage(false);
  if(document.getElementById("editModal").style.display==="flex") return closeEditModal(false);
  if(document.getElementById("ruleModal").style.display==="flex") return closeRule(false);
  if(document.getElementById("tierModal").style.display==="flex") return closeTierModal(false);
}

function openRule(){
  document.getElementById("ruleModal").style.display="flex";
  pushStep();
}

function closeRule(back=true){
  document.getElementById("ruleModal").style.display="none";
  if(back) history.back();
}

async function openTier(tier){
  currentTier = tier;
  document.getElementById("modalTitle").innerText = tier + " 현황";
  document.getElementById("managerName").innerText = localStorage.getItem("manager_" + tier) || managerMap[tier] || "미정";
  document.getElementById("adminForm").style.display = adminOk ? "block" : "none";
  document.getElementById("normalBtn").style.display = adminOk ? "inline-block" : "none";
  document.getElementById("adminTopBtn").style.display = adminOk ? "none" : "inline-block";
  document.getElementById("tierModal").style.display = "flex";
  pushStep();
  await loadList();
}

function closeTierModal(back=true){
  document.getElementById("tierModal").style.display="none";
  if(back) history.back();
}

function adminLogin(){
  const pw = prompt("운영진 비밀번호를 입력하세요.");
  if(pw === "8282"){
    adminOk = true;
    document.getElementById("adminForm").style.display="block";
    document.getElementById("normalBtn").style.display="inline-block";
    document.getElementById("adminTopBtn").style.display="none";
    loadList();
  }else{
    alert("비밀번호가 틀렸습니다.");
  }
}

function normalMode(){
  adminOk = false;
  document.getElementById("adminForm").style.display="none";
  document.getElementById("normalBtn").style.display="none";
  document.getElementById("adminTopBtn").style.display="inline-block";
  loadList();
}

function editManager(){
  const pw = prompt("운영진 비밀번호를 입력하세요.");
  if(pw !== "8282") return alert("비밀번호가 틀렸습니다.");

  const now = document.getElementById("managerName").innerText;
  const next = prompt("담당자를 입력하세요.", now);
  if(next === null) return;

  localStorage.setItem("manager_" + currentTier, next.trim() || "미정");
  document.getElementById("managerName").innerText = next.trim() || "미정";
}

async function uploadFile(file, folder){
  if(!file) return null;

  const ext = (file.name.split(".").pop() || "jpg").toLowerCase().replace(/[^a-z0-9]/g,"") || "jpg";

  const tierMap = {
    "프로":"pro",
    "강주/주":"main",
    "1군":"tier1",
    "2군":"tier2",
    "3군":"tier3",
    "4군":"tier4"
  };

  const safeFolder = tierMap[folder] || "etc";
  const fileName = `${safeFolder}_${Date.now()}_${Math.random().toString(36).slice(2)}.${ext}`;

  const { error } = await db.storage
    .from("liquid-files")
    .upload(fileName, file, {
      cacheControl: "3600",
      upsert: false
    });

  if(error){
    alert("사진 업로드 실패: " + error.message);
    return null;
  }

  const { data } = db.storage
    .from("liquid-files")
    .getPublicUrl(fileName);

  return data.publicUrl;
}

async function saveMember(){
  if(!adminOk) return alert("운영진 모드에서만 등록 가능합니다.");

  const nickname = document.getElementById("nick").value.trim();
  const military_rank = document.getElementById("rank").value.trim();
  const career = document.getElementById("note").value.trim();
  const f1 = document.getElementById("file1").files[0];
  const f2 = document.getElementById("file2").files[0];

  if(!nickname) return alert("닉네임을 입력해주세요.");

  const file1_url = await uploadFile(f1, currentTier);
  const file2_url = await uploadFile(f2, currentTier);

  const { error } = await db.from("liquid_applications").insert({
    tier: currentTier,
    nickname,
    military_rank,
    career,
    file1_url,
    file2_url,
    status: "pending"
  });

  if(error) return alert("등록 실패: " + error.message);

  alert("등록되었습니다.");

  document.getElementById("nick").value="";
  document.getElementById("rank").value="";
  document.getElementById("note").value="";
  document.getElementById("file1").value="";
  document.getElementById("file2").value="";

  loadList();
}

async function loadList(){
  const { data, error } = await db
    .from("liquid_applications")
    .select("*")
    .eq("tier", currentTier)
    .order("created_at", {ascending:false});

  const body = document.getElementById("listBody");

  if(error){
    body.innerHTML = `<tr><td colspan="5">불러오기 실패: ${error.message}</td></tr>`;
    return;
  }

  if(!data || data.length === 0){
    body.innerHTML = `<tr><td colspan="5">등록된 명단이 없습니다.</td></tr>`;
    return;
  }

  body.innerHTML = data.map(row=>{
    const shots = `
      ${row.file1_url ? `<button class="mini-action blue" onclick="openImage('${row.file1_url}')">사진1</button>` : ""}
      ${row.file2_url ? `<button class="mini-action blue" onclick="openImage('${row.file2_url}')">사진2</button>` : ""}
    `.trim() || "-";

    const confirmed = row.status === "confirmed";

    return `
      <tr>
        <td>${escapeHtml(row.nickname || "")}</td>
        <td>${escapeHtml(row.military_rank || "")}</td>
        <td>${shots}</td>
        <td>${escapeHtml(row.career || "")}</td>
        <td>
          ${confirmed ? `<span class="badge badge-ok">확정</span>` : `<span class="badge badge-wait">지원중</span>`}
          ${adminOk ? `
            <div class="action-row">
              ${!confirmed ? `<button class="mini-action red" onclick="confirmMember(${row.id})">확정</button>` : ""}
              <button class="mini-action blue" onclick="openEdit(${row.id})">수정</button>
              <button class="mini-action gray" onclick="deleteMember(${row.id})">삭제</button>
            </div>
          ` : ""}
        </td>
      </tr>
    `;
  }).join("");
}

function openImage(url){
  document.getElementById("bigImage").src = url;
  document.getElementById("imageModal").style.display = "flex";
}

function closeImage(){
  document.getElementById("imageModal").style.display = "none";
  document.getElementById("bigImage").src = "";
}

async function confirmMember(id){
  if(!adminOk) return alert("운영진 모드에서만 가능합니다.");
  if(!confirm("이 인원을 확정 처리할까요?")) return;

  const { error } = await db
    .from("liquid_applications")
    .update({status:"confirmed"})
    .eq("id", id);

  if(error) return alert("확정 실패: " + error.message);

  loadList();
}

async function openEdit(id){
  if(!adminOk) return alert("운영진 모드에서만 가능합니다.");

  const { data, error } = await db
    .from("liquid_applications")
    .select("*")
    .eq("id", id)
    .single();

  if(error) return alert("불러오기 실패: " + error.message);

  editingId = id;
  editingFile1 = data.file1_url;
  editingFile2 = data.file2_url;

  document.getElementById("editNick").value = data.nickname || "";
  document.getElementById("editRank").value = data.military_rank || "";
  document.getElementById("editNote").value = data.career || "";
  document.getElementById("editFile1").value = "";
  document.getElementById("editFile2").value = "";

  renderEditFiles();
  document.getElementById("editModal").style.display="flex";
  pushStep();
}

function closeEditModal(back=true){
  document.getElementById("editModal").style.display="none";
  if(back) history.back();
}

function renderEditFiles(){
  document.getElementById("editCurrentFiles").innerHTML = `
    <div>
      스크린샷 1 :
      ${editingFile1 ? `<button class="mini-action blue" onclick="openImage('${editingFile1}')">보기</button>
      <button class="mini-action gray" onclick="removeEditFile(1)">삭제</button>` : "-"}
    </div>
    <div>
      스크린샷 2 :
      ${editingFile2 ? `<button class="mini-action blue" onclick="openImage('${editingFile2}')">보기</button>
      <button class="mini-action gray" onclick="removeEditFile(2)">삭제</button>` : "-"}
    </div>
  `;
}

function removeEditFile(num){
  if(num === 1) editingFile1 = null;
  if(num === 2) editingFile2 = null;
  renderEditFiles();
}

async function saveEdit(){
  if(!adminOk) return alert("운영진 모드에서만 가능합니다.");

  const newFile1 = document.getElementById("editFile1").files[0];
  const newFile2 = document.getElementById("editFile2").files[0];

  let file1_url = editingFile1;
  let file2_url = editingFile2;

  if(newFile1) file1_url = await uploadFile(newFile1, currentTier);
  if(newFile2) file2_url = await uploadFile(newFile2, currentTier);

  const { error } = await db
    .from("liquid_applications")
    .update({
      nickname: document.getElementById("editNick").value.trim(),
      military_rank: document.getElementById("editRank").value.trim(),
      career: document.getElementById("editNote").value.trim(),
      file1_url,
      file2_url
    })
    .eq("id", editingId);

  if(error) return alert("수정 실패: " + error.message);

  document.getElementById("editModal").style.display="none";
  loadList();
}

async function deleteMember(id){
  if(!adminOk) return alert("운영진 모드에서만 가능합니다.");
  if(!confirm("정말 삭제할까요?")) return;

  const { error } = await db
    .from("liquid_applications")
    .delete()
    .eq("id", id);

  if(error) return alert("삭제 실패: " + error.message);

  loadList();
}

async function captureTier(){
  const target = document.getElementById("captureArea");

  if(!target){
    alert("스크린샷할 화면을 찾을 수 없습니다.");
    return;
  }

  const canvas = await html2canvas(target, {
    backgroundColor:"#050713",
    scale:2,
    useCORS:true
  });

  const link = document.createElement("a");
  link.download = `${currentTier || "liquid"}_현황.png`;
  link.href = canvas.toDataURL("image/png");
  link.click();
}

function escapeHtml(text){
  return String(text)
    .replaceAll("&","&amp;")
    .replaceAll("<","&lt;")
    .replaceAll(">","&gt;")
    .replaceAll('"',"&quot;")
    .replaceAll("'","&#039;");
}
