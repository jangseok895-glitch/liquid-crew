<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>리퀴드크루</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
*{box-sizing:border-box}
body{margin:0;font-family:'Malgun Gothic',Arial,sans-serif;background:#03030c;color:white}
#intro{position:fixed;inset:0;background:url('https://i.ibb.co/zHjPvK8n/image.png') center/cover no-repeat;display:flex;align-items:center;justify-content:center;z-index:9999}
#intro:after{content:"";position:absolute;inset:0;background:rgba(0,0,0,.45)}
.intro-box{z-index:2;text-align:center;background:rgba(0,0,0,.55);padding:30px 45px;border-radius:22px;border:1px solid rgba(255,255,255,.25);box-shadow:0 0 35px rgba(0,170,255,.55)}
#count{font-size:95px;font-weight:900;color:#8ee7ff}
.main{min-height:100vh;background:url('https://i.ibb.co/PvHqVGW0/2.png') top center/cover no-repeat fixed;padding:215px 18px 40px}
.content{max-width:900px;margin:0 auto}
.menu-panel{padding:16px;border-radius:22px;background:rgba(3,8,25,.62);border:1px solid rgba(120,210,255,.38);box-shadow:0 0 30px rgba(0,130,255,.25)}
.menu-title{text-align:center;margin-bottom:13px;font-size:17px;color:#c8f4ff;letter-spacing:3px}
.top-menu{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:12px}
.sub-menu{display:grid;grid-template-columns:repeat(6,1fr);gap:8px}
button{cursor:pointer;border:none}
.menu-btn{border-radius:14px;font-weight:900;color:white;border:1px solid rgba(255,255,255,.25);box-shadow:0 5px 14px rgba(0,0,0,.45)}
.big-btn{height:58px;font-size:18px}
.small-btn{height:44px;font-size:14px}
.kakao{background:linear-gradient(135deg,#ffe252,#ff9f1a);color:#111}
.rule{background:linear-gradient(135deg,#333,#555)}
.tier{background:linear-gradient(135deg,#2357b9,#8a23d7)}
.modal{display:none;position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:1000;align-items:center;justify-content:center;padding:20px}
.modal-box{width:100%;max-width:950px;max-height:88vh;overflow:auto;border-radius:22px;background:linear-gradient(180deg,#101631,#050713);border:1px solid rgba(120,220,255,.45);box-shadow:0 0 35px rgba(0,180,255,.4);padding:24px}
.modal-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:15px}
.modal-head h2{margin:0;color:#9eefff}
.close-btn{border-radius:10px;padding:8px 13px;font-weight:900}
.manager{margin-bottom:15px;color:#ffd66b;font-weight:bold}
table{width:100%;border-collapse:collapse;margin-top:10px;background:rgba(255,255,255,.04)}
th,td{border:1px solid rgba(255,255,255,.16);padding:10px;text-align:center}
th{background:rgba(70,170,255,.25);color:#bfeeff}
.badge{display:inline-block;background:red;color:white;border-radius:999px;padding:5px 10px;font-size:12px;font-weight:900}
.admin-btn,.save-btn,.confirm-btn{margin-top:12px;width:100%;height:45px;border-radius:12px;font-weight:900;font-size:15px}
.admin-btn{background:#222;color:#eee;border:1px solid rgba(255,255,255,.25)}
.save-btn{background:linear-gradient(135deg,#20d6ff,#7a5cff);color:white}
.confirm-btn{background:#ff3434;color:white}
.form-area{display:none;margin-top:15px;padding:15px;border-radius:16px;background:rgba(255,255,255,.07)}
input,textarea{width:100%;margin-bottom:10px;padding:12px;border-radius:10px;border:none}
textarea{min-height:75px}
.img-link{color:#7ee7ff;text-decoration:underline;font-weight:900}
.rule-img{width:100%;border-radius:14px}
@media(max-width:800px){.main{padding-top:190px}.sub-menu{grid-template-columns:repeat(3,1fr)}}
@media(max-width:520px){.main{padding-top:175px}.top-menu{grid-template-columns:1fr}.sub-menu{grid-template-columns:repeat(2,1fr)}}
</style>
</head>

<body>

<div id="intro">
  <div class="intro-box">
    <h1>사이트로 이동합니다</h1>
    <div id="count">3</div>
  </div>
</div>

<div class="main">
  <div class="content">
    <div class="menu-panel">
      <div class="menu-title">LIQUID CREW MENU</div>

      <div class="top-menu">
        <button class="menu-btn big-btn kakao" onclick="window.open('https://open.kakao.com/o/gCJzBB8h')">가입문의방 들어가기</button>
        <button class="menu-btn big-btn rule" onclick="openRule()">규정 / 개요</button>
      </div>

      <div class="sub-menu">
        <button class="menu-btn small-btn tier" onclick="openTier('프로','케디치')">프로</button>
        <button class="menu-btn small-btn tier" onclick="openTier('강주/주','케디치 / 미정')">강주/주</button>
        <button class="menu-btn small-btn tier" onclick="openTier('1군','블랙')">1군</button>
        <button class="menu-btn small-btn tier" onclick="openTier('2군','블랙')">2군</button>
        <button class="menu-btn small-btn tier" onclick="openTier('3군','블랙')">3군</button>
        <button class="menu-btn small-btn tier" onclick="openTier('4군','블랙')">4군</button>
      </div>
    </div>
  </div>
</div>

<div class="modal" id="tierModal">
  <div class="modal-box">
    <div class="modal-head">
      <h2 id="modalTitle"></h2>
      <button class="close-btn" onclick="closeModal()">닫기</button>
    </div>

    <div class="manager" id="managerText"></div>

    <table>
      <thead>
        <tr>
          <th>닉네임</th>
          <th>군수</th>
          <th>스크린샷</th>
          <th>비고</th>
          <th>확정</th>
        </tr>
      </thead>
      <tbody id="listBody"></tbody>
    </table>

    <button class="admin-btn" onclick="adminLogin()">운영진 모드</button>

    <div class="form-area" id="adminForm">
      <input id="nick" placeholder="닉네임">
      <input id="rank" placeholder="군수">
      <textarea id="note" placeholder="비고"></textarea>

      <label>추가 스크린샷 1</label>
      <input id="file1" type="file" accept="image/*">

      <label>추가 스크린샷 2</label>
      <input id="file2" type="file" accept="image/*">

      <button class="save-btn" onclick="saveMember()">명단 등록하기</button>
    </div>
  </div>
</div>

<div class="modal" id="ruleModal">
  <div class="modal-box">
    <div class="modal-head">
      <h2>규정 / 개요</h2>
      <button class="close-btn" onclick="document.getElementById('ruleModal').style.display='none'">닫기</button>
    </div>
    <img class="rule-img" src="https://i.ibb.co/QvgrXYkH/image.jpg">
  </div>
</div>

<script>
const SUPABASE_URL = "https://xyibdanmecakevhtdajl.supabase.co";
const SUPABASE_KEY = "sb_publishable_uvYqwDymxodcSdpT1zAWyg_PeVHh_ZO";
const db = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

let currentTier = "";
let adminOk = false;

let count = 3;
const timer = setInterval(()=>{
  document.getElementById("count").innerText = count;
  count--;
  if(count < 0){
    clearInterval(timer);
    document.getElementById("intro").style.display="none";
  }
},1000);

function openRule(){
  document.getElementById("ruleModal").style.display="flex";
}

async function openTier(tier, manager){
  currentTier = tier;
  document.getElementById("modalTitle").innerText = tier + " 현황";
  document.getElementById("managerText").innerText = "담당자 : " + manager;
  document.getElementById("adminForm").style.display = adminOk ? "block" : "none";
  document.getElementById("tierModal").style.display = "flex";
  await loadList();
}

function closeModal(){
  document.getElementById("tierModal").style.display="none";
}

function adminLogin(){
  const pw = prompt("운영진 비밀번호를 입력하세요.");
  if(pw === "8282"){
    adminOk = true;
    document.getElementById("adminForm").style.display="block";
    alert("운영진 모드가 활성화되었습니다.");
    loadList();
  }else{
    alert("비밀번호가 틀렸습니다.");
  }
}

async function uploadFile(file, folder){
  if(!file) return null;

  const safeFolder = folder.replaceAll("/","_");
  const ext = file.name.split(".").pop() || "jpg";
  const fileName = `${safeFolder}/${Date.now()}_${Math.random().toString(36).slice(2)}.${ext}`;

  const { error } = await db.storage
    .from("liquid-files")
    .upload(fileName, file, {
      cacheControl: "3600",
      upsert: false
    });

  if(error){
    alert("사진 업로드 실패: " + error.message);
    return null;
  }

  const { data } = db.storage
    .from("liquid-files")
    .getPublicUrl(fileName);

  return data.publicUrl;
}

async function saveMember(){
  if(!adminOk){
    alert("운영진 모드에서만 등록 가능합니다.");
    return;
  }

  const nickname = document.getElementById("nick").value.trim();
  const military_rank = document.getElementById("rank").value.trim();
  const career = document.getElementById("note").value.trim();
  const f1 = document.getElementById("file1").files[0];
  const f2 = document.getElementById("file2").files[0];

  if(!nickname){
    alert("닉네임을 입력해주세요.");
    return;
  }

  const file1_url = await uploadFile(f1, currentTier);
  const file2_url = await uploadFile(f2, currentTier);

  const { error } = await db.from("liquid_applications").insert({
    tier: currentTier,
    nickname,
    military_rank,
    career,
    file1_url,
    file2_url,
    status: "pending"
  });

  if(error){
    alert("등록 실패: " + error.message);
    return;
  }

  alert("등록되었습니다.");

  document.getElementById("nick").value="";
  document.getElementById("rank").value="";
  document.getElementById("note").value="";
  document.getElementById("file1").value="";
  document.getElementById("file2").value="";

  loadList();
}

async function loadList(){
  const { data, error } = await db
    .from("liquid_applications")
    .select("*")
    .eq("tier", currentTier)
    .order("created_at", {ascending:false});

  const body = document.getElementById("listBody");

  if(error){
    body.innerHTML = `<tr><td colspan="5">불러오기 실패: ${error.message}</td></tr>`;
    return;
  }

  if(!data || data.length === 0){
    body.innerHTML = `<tr><td colspan="5">등록된 명단이 없습니다.</td></tr>`;
    return;
  }

  body.innerHTML = data.map(row=>{
    const shots = `
      ${row.file1_url ? `<a class="img-link" href="${row.file1_url}" target="_blank">사진1 보기</a>` : ""}
      ${row.file2_url ? `<a class="img-link" href="${row.file2_url}" target="_blank">사진2 보기</a>` : ""}
    `.trim() || "-";

    const confirmed = row.status === "confirmed";

    return `
      <tr>
        <td>${escapeHtml(row.nickname || "")}</td>
        <td>${escapeHtml(row.military_rank || "")}</td>
        <td>${shots}</td>
        <td>${escapeHtml(row.career || "")}</td>
        <td>
          ${confirmed ? `<span class="badge">확정!</span>` :
          adminOk ? `<button class="confirm-btn" onclick="confirmMember(${row.id})">확정하기</button>` : `-`}

          ${adminOk ? `
            <br>
            <button class="confirm-btn" style="background:#2b7cff" onclick="editMember(${row.id}, '${escapeJs(row.nickname)}', '${escapeJs(row.military_rank)}', '${escapeJs(row.career)}')">수정</button>
            <button class="confirm-btn" style="background:#777" onclick="deleteMember(${row.id})">삭제</button>
          ` : ""}
        </td>
      </tr>
    `;
  }).join("");
}

async function confirmMember(id){
  if(!adminOk) return alert("운영진 모드에서만 가능합니다.");
  if(!confirm("이 인원을 확정 처리할까요?")) return;

  const { error } = await db
    .from("liquid_applications")
    .update({status:"confirmed"})
    .eq("id", id);

  if(error) return alert("확정 실패: " + error.message);

  alert("확정 처리되었습니다.");
  loadList();
}

async function editMember(id, oldNick, oldRank, oldCareer){
  if(!adminOk) return alert("운영진 모드에서만 가능합니다.");

  const nickname = prompt("닉네임 수정", oldNick);
  if(nickname === null) return;

  const military_rank = prompt("군수 수정", oldRank);
  if(military_rank === null) return;

  const career = prompt("비고 수정", oldCareer);
  if(career === null) return;

  const { error } = await db
    .from("liquid_applications")
    .update({
      nickname,
      military_rank,
      career
    })
    .eq("id", id);

  if(error) return alert("수정 실패: " + error.message);

  alert("수정되었습니다.");
  loadList();
}

async function deleteMember(id){
  if(!adminOk) return alert("운영진 모드에서만 가능합니다.");
  if(!confirm("정말 삭제할까요?")) return;

  const { error } = await db
    .from("liquid_applications")
    .delete()
    .eq("id", id);

  if(error) return alert("삭제 실패: " + error.message);

  alert("삭제되었습니다.");
  loadList();
}

function escapeHtml(text){
  return String(text)
    .replaceAll("&","&amp;")
    .replaceAll("<","&lt;")
    .replaceAll(">","&gt;")
    .replaceAll('"',"&quot;")
    .replaceAll("'","&#039;");
}

function escapeJs(text){
  return String(text || "")
    .replaceAll("\\","\\\\")
    .replaceAll("'","\\'")
    .replaceAll("\n"," ");
}
</script>
  
</body>
</html>
