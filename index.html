<style>
*{box-sizing:border-box}
body{margin:0;font-family:'Malgun Gothic',Arial,sans-serif;background:#03030c;color:white;min-width:760px}

#intro{position:fixed;inset:0;background:#03030c;display:flex;align-items:center;justify-content:center;z-index:9999;overflow:hidden}
#introVideo{position:absolute;inset:0;width:100%;height:100%;object-fit:contain;background:#03030c}

.main{min-height:100vh;background:#03030c;padding:0 0 40px;display:flex;justify-content:center}

.content{position:absolute;top:190px;left:50%;transform:translateX(-50%);width:620px;margin:0}

<script>
const SUPABASE_URL = "https://xyibdanmecakevhtdajl.supabase.co";
const SUPABASE_KEY = "sb_publishable_uvYqwDymxodcSdpT1zAWyg_PeVHh_ZO";
const db = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

const managerMap = {
  "프로":"케디치",
  "강주/주":"케디치 / 미정",
  "1군":"블랙",
  "2군":"블랙",
  "3군":"블랙",
  "4군":"블랙"
};

let currentTier = "";
let adminOk = false;
let editingId = null;
let editingFile1 = null;
let editingFile2 = null;

window.addEventListener("DOMContentLoaded", () => {
  const video = document.getElementById("introVideo");
  const intro = document.getElementById("intro");
  const isMobile = /Android|iPhone|iPad|iPod|KAKAOTALK/i.test(navigator.userAgent);

  if(!video) return;

  if(isMobile){
    video.style.display = "none";
    intro.style.background = "#03030c url('https://i.ibb.co/KxqK35Hx/11.jpg') center/contain no-repeat";
    return;
  }

  video.muted = true;
  video.playsInline = true;
  video.currentTime = 0;
  video.load();

  const playPromise = video.play();

  if(playPromise){
    playPromise.catch(() => {
      video.style.display = "none";
      intro.style.background = "#03030c url('https://i.ibb.co/KxqK35Hx/11.jpg') center/contain no-repeat";
    });
  }

  video.addEventListener("ended", () => {
    video.style.display = "none";
    intro.style.background = "#03030c url('https://i.ibb.co/KxqK35Hx/11.jpg') center/contain no-repeat";
  });
});

function enterSite(){
  const intro = document.getElementById("intro");
  const video = document.getElementById("introVideo");
  const sound = document.getElementById("enterSound");

  if(sound){
    sound.currentTime = 0;
    sound.play().catch(()=>{});
  }

  intro.style.opacity = "0";
  intro.style.transition = ".6s";

  setTimeout(()=>{
    intro.style.display = "none";
    if(video) video.pause();
  },600);
}

window.onpopstate = function(){
  closeTopModal();
};

function pushStep(){
  history.pushState({modal:true},"");
}

function closeTopModal(){
  if(document.getElementById("imageModal").style.display==="flex") return closeImage(false);
  if(document.getElementById("editModal").style.display==="flex") return closeEditModal(false);
  if(document.getElementById("noticeWriteModal").style.display==="flex") return closeNoticeWrite(false);
  if(document.getElementById("noticeModal").style.display==="flex") return closeNotice(false);
  if(document.getElementById("ruleModal").style.display==="flex") return closeRule(false);
  if(document.getElementById("tierModal").style.display==="flex") return closeTierModal(false);
}

function openRule(){
  document.getElementById("ruleModal").style.display="flex";
  pushStep();
}

function closeRule(back=true){
  document.getElementById("ruleModal").style.display="none";
  if(back) history.back();
}

async function openTier(tier){
  currentTier = tier;
  document.getElementById("modalTitle").innerText = tier + " 현황";
  document.getElementById("managerName").innerText = localStorage.getItem("manager_" + tier) || managerMap[tier] || "미정";
  document.getElementById("adminForm").style.display = adminOk ? "block" : "none";
  document.getElementById("normalBtn").style.display = adminOk ? "inline-block" : "none";
  document.getElementById("adminTopBtn").style.display = adminOk ? "none" : "inline-block";
  document.getElementById("tierModal").style.display = "flex";
  pushStep();
  await loadList();
}

function closeTierModal(back=true){
  document.getElementById("tierModal").style.display="none";
  if(back) history.back();
}

function adminLogin(){
  const pw = prompt("운영진 비밀번호를 입력하세요.");
  if(pw === "8282"){
    adminOk = true;
    document.getElementById("adminForm").style.display="block";
    document.getElementById("normalBtn").style.display="inline-block";
    document.getElementById("adminTopBtn").style.display="none";
    loadList();
  }else{
    alert("비밀번호가 틀렸습니다.");
  }
}

function normalMode(){
  adminOk = false;
  document.getElementById("adminForm").style.display="none";
  document.getElementById("normalBtn").style.display="none";
  document.getElementById("adminTopBtn").style.display="inline-block";
  loadList();
}

function editManager(){
  const pw = prompt("운영진 비밀번호를 입력하세요.");
  if(pw !== "8282") return alert("비밀번호가 틀렸습니다.");

  const now = document.getElementById("managerName").innerText;
  const next = prompt("담당자를 입력하세요.", now);
  if(next === null) return;

  localStorage.setItem("manager_" + currentTier, next.trim() || "미정");
  document.getElementById("managerName").innerText = next.trim() || "미정";
}

async function uploadFile(file, folder){
  if(!file) return null;

  const ext = (file.name.split(".").pop() || "jpg").toLowerCase().replace(/[^a-z0-9]/g,"") || "jpg";

  const tierMap = {
    "프로":"pro",
    "강주/주":"main",
    "1군":"tier1",
    "2군":"tier2",
    "3군":"tier3",
    "4군":"tier4"
  };

  const safeFolder = tierMap[folder] || "etc";
  const fileName = `${safeFolder}_${Date.now()}_${Math.random().toString(36).slice(2)}.${ext}`;

  const { error } = await db.storage
    .from("liquid-files")
    .upload(fileName, file, {
      cacheControl: "3600",
      upsert: false
    });

  if(error){
    alert("사진 업로드 실패: " + error.message);
    return null;
  }

  const { data } = db.storage
    .from("liquid-files")
    .getPublicUrl(fileName);

  return data.publicUrl;
}

async function saveMember(){
  if(!adminOk) return alert("운영진 모드에서만 등록 가능합니다.");

  const nickname = document.getElementById("nick").value.trim();
  const military_rank = document.getElementById("rank").value.trim();
  const career = document.getElementById("note").value.trim();
  const f1 = document.getElementById("file1").files[0];
  const f2 = document.getElementById("file2").files[0];

  if(!nickname) return alert("닉네임을 입력해주세요.");

  const file1_url = await uploadFile(f1, currentTier);
  const file2_url = await uploadFile(f2, currentTier);

  const { error } = await db.from("liquid_applications").insert({
    tier: currentTier,
    nickname,
    military_rank,
    career,
    file1_url,
    file2_url,
    status: "pending"
  });

  if(error) return alert("등록 실패: " + error.message);

  alert("등록되었습니다.");

  document.getElementById("nick").value="";
  document.getElementById("rank").value="";
  document.getElementById("note").value="";
  document.getElementById("file1").value="";
  document.getElementById("file2").value="";

  loadList();
}

async function loadList(){
  const { data, error } = await db
    .from("liquid_applications")
    .select("*")
    .eq("tier", currentTier)
    .order("created_at", {ascending:false});

  const body = document.getElementById("listBody");

  if(error){
    body.innerHTML = `<tr><td colspan="5">불러오기 실패: ${error.message}</td></tr>`;
    return;
  }

  if(!data || data.length === 0){
    body.innerHTML = `<tr><td colspan="5">등록된 명단이 없습니다.</td></tr>`;
    return;
  }

  body.innerHTML = data.map(row=>{
    const shots = `
      ${row.file1_url ? `<button class="mini-action blue" onclick="openImage('${row.file1_url}')">사진1</button>` : ""}
      ${row.file2_url ? `<button class="mini-action blue" onclick="openImage('${row.file2_url}')">사진2</button>` : ""}
    `.trim() || "-";

    const confirmed = row.status === "confirmed";

    return `
      <tr>
        <td>${escapeHtml(row.nickname || "")}</td>
        <td>${escapeHtml(row.military_rank || "")}</td>
        <td>${shots}</td>
        <td>${escapeHtml(row.career || "")}</td>
        <td>
          ${confirmed ? `<span class="badge badge-ok">확정</span>` : `<span class="badge badge-wait">지원중</span>`}
          ${adminOk ? `
            <div class="action-row">
              ${!confirmed ? `<button class="mini-action red" onclick="confirmMember(${row.id})">확정</button>` : ""}
              <button class="mini-action blue" onclick="openEdit(${row.id})">수정</button>
              <button class="mini-action gray" onclick="deleteMember(${row.id})">삭제</button>
            </div>
          ` : ""}
        </td>
      </tr>
    `;
  }).join("");
}

function openImage(url){
  document.getElementById("bigImage").src = url;
  document.getElementById("imageModal").style.display = "flex";
}

function closeImage(){
  document.getElementById("imageModal").style.display = "none";
  document.getElementById("bigImage").src = "";
}

async function confirmMember(id){
  if(!adminOk) return alert("운영진 모드에서만 가능합니다.");
  if(!confirm("이 인원을 확정 처리할까요?")) return;

  const { error } = await db
    .from("liquid_applications")
    .update({status:"confirmed"})
    .eq("id", id);

  if(error) return alert("확정 실패: " + error.message);

  loadList();
}

async function openEdit(id){
  if(!adminOk) return alert("운영진 모드에서만 가능합니다.");

  const { data, error } = await db
    .from("liquid_applications")
    .select("*")
    .eq("id", id)
    .single();

  if(error) return alert("불러오기 실패: " + error.message);

  editingId = id;
  editingFile1 = data.file1_url;
  editingFile2 = data.file2_url;

  document.getElementById("editNick").value = data.nickname || "";
  document.getElementById("editRank").value = data.military_rank || "";
  document.getElementById("editNote").value = data.career || "";
  document.getElementById("editFile1").value = "";
  document.getElementById("editFile2").value = "";

  renderEditFiles();
  document.getElementById("editModal").style.display="flex";
  pushStep();
}

function closeEditModal(back=true){
  document.getElementById("editModal").style.display="none";
  if(back) history.back();
}

function renderEditFiles(){
  document.getElementById("editCurrentFiles").innerHTML = `
    <div>
      스크린샷 1 :
      ${editingFile1 ? `<button class="mini-action blue" onclick="openImage('${editingFile1}')">보기</button>
      <button class="mini-action gray" onclick="removeEditFile(1)">삭제</button>` : "-"}
    </div>
    <div>
      스크린샷 2 :
      ${editingFile2 ? `<button class="mini-action blue" onclick="openImage('${editingFile2}')">보기</button>
      <button class="mini-action gray" onclick="removeEditFile(2)">삭제</button>` : "-"}
    </div>
  `;
}

function removeEditFile(num){
  if(num === 1) editingFile1 = null;
  if(num === 2) editingFile2 = null;
  renderEditFiles();
}

async function saveEdit(){
  if(!adminOk) return alert("운영진 모드에서만 가능합니다.");

  const newFile1 = document.getElementById("editFile1").files[0];
  const newFile2 = document.getElementById("editFile2").files[0];

  let file1_url = editingFile1;
  let file2_url = editingFile2;

  if(newFile1) file1_url = await uploadFile(newFile1, currentTier);
  if(newFile2) file2_url = await uploadFile(newFile2, currentTier);

  const { error } = await db
    .from("liquid_applications")
    .update({
      nickname: document.getElementById("editNick").value.trim(),
      military_rank: document.getElementById("editRank").value.trim(),
      career: document.getElementById("editNote").value.trim(),
      file1_url,
      file2_url
    })
    .eq("id", editingId);

  if(error) return alert("수정 실패: " + error.message);

  document.getElementById("editModal").style.display="none";
  loadList();
}

async function deleteMember(id){
  if(!adminOk) return alert("운영진 모드에서만 가능합니다.");
  if(!confirm("정말 삭제할까요?")) return;

  const { error } = await db
    .from("liquid_applications")
    .delete()
    .eq("id", id);

  if(error) return alert("삭제 실패: " + error.message);

  loadList();
}

async function captureTier(){
  const target = document.getElementById("captureArea");

  if(!target){
    alert("스크린샷할 화면을 찾을 수 없습니다.");
    return;
  }

  const canvas = await html2canvas(target, {
    backgroundColor:"#050713",
    scale:2,
    useCORS:true
  });

  const link = document.createElement("a");
  link.download = `${currentTier || "liquid"}_현황.png`;
  link.href = canvas.toDataURL("image/png");
  link.click();
}


let currentNoticeId = null;

function getNoticeVisitorKey(){
  let key = localStorage.getItem("liquid_notice_visitor_key");
  if(!key){
    key = "v_" + Date.now() + "_" + Math.random().toString(36).slice(2);
    localStorage.setItem("liquid_notice_visitor_key", key);
  }
  return key;
}

function formatDateTime(v){
  if(!v) return "-";
  const d = new Date(v);
  if(Number.isNaN(d.getTime())) return "-";
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}-${String(d.getDate()).padStart(2,"0")} ${String(d.getHours()).padStart(2,"0")}:${String(d.getMinutes()).padStart(2,"0")}`;
}

function validateNoticeImage(file){
  if(!file) return true;
  const ok = ["image/jpeg","image/png"].includes(file.type);
  if(!ok) alert("공지사항 첨부파일은 jpg, png만 가능합니다.");
  return ok;
}

async function openNotice(){
  document.getElementById("noticeModal").style.display="flex";
  document.getElementById("noticeListView").style.display="block";
  document.getElementById("noticeDetailView").style.display="none";
  pushStep();
  await loadNoticeList();
}

function closeNotice(back=true){
  document.getElementById("noticeModal").style.display="none";
  currentNoticeId = null;
  if(back) history.back();
}

function openNoticeWrite(){
  document.getElementById("noticeWriteModal").style.display="flex";
  pushStep();
}

function closeNoticeWrite(back=true){
  document.getElementById("noticeWriteModal").style.display="none";
  if(back) history.back();
}

async function loadNoticeList(){
  const box = document.getElementById("noticeList");
  box.innerHTML = `<div class="notice-empty">불러오는 중...</div>`;

  const { data, error } = await db
    .from("liquid_notice_posts")
    .select("id,title,created_at,file1_url,file2_url,file3_url,like_count,dislike_count")
    .order("created_at", { ascending:false });

  if(error){
    box.innerHTML = `<div class="notice-empty">공지사항 불러오기 실패: ${escapeHtml(error.message)}</div>`;
    return;
  }

  if(!data || data.length === 0){
    box.innerHTML = `<div class="notice-empty">등록된 공지사항이 없습니다.</div>`;
    return;
  }

  box.innerHTML = data.map((row,idx)=>`
    <div class="notice-row" onclick="openNoticeDetail(${row.id})">
      <div class="notice-row-small">${data.length - idx}</div>
      <div class="notice-row-title">${escapeHtml(row.title || "제목 없음")}</div>
      <div class="notice-row-small">👍 ${row.like_count || 0} / 👎 ${row.dislike_count || 0}</div>
      <div class="notice-row-small date">${formatDateTime(row.created_at)}</div>
    </div>
  `).join("");
}

async function openNoticeDetail(id){
  currentNoticeId = id;
  document.getElementById("noticeListView").style.display="none";
  document.getElementById("noticeDetailView").style.display="block";
  await loadNoticeDetail();
}

async function loadNoticeDetail(){
  const box = document.getElementById("noticeDetailView");
  box.innerHTML = `<div class="notice-empty">불러오는 중...</div>`;

  const { data:post, error } = await db
    .from("liquid_notice_posts")
    .select("*")
    .eq("id", currentNoticeId)
    .single();

  if(error){
    box.innerHTML = `<button class="notice-back" onclick="backNoticeList()">목록으로</button><div class="notice-empty">공지 불러오기 실패: ${escapeHtml(error.message)}</div>`;
    return;
  }

  const { data:comments } = await db
    .from("liquid_notice_comments")
    .select("*")
    .eq("post_id", currentNoticeId)
    .order("created_at", { ascending:true });

  const imgs = [post.file1_url, post.file2_url, post.file3_url].filter(Boolean).map(url=>`<img class="notice-thumb" src="${url}" onclick="openImage('${url}')">`).join("");
  const commentHtml = comments && comments.length ? comments.map(c=>`
    <div class="notice-comment-item">
      <div class="notice-comment-meta">${formatDateTime(c.created_at)}</div>
      <div class="notice-comment-content">${escapeHtml(c.content || "")}</div>
      <div class="action-row" style="justify-content:flex-end">
        <button class="mini-action gray" onclick="deleteNoticeComment(${c.id})">삭제</button>
      </div>
    </div>
  `).join("") : `<div class="notice-empty">아직 댓글이 없습니다.</div>`;

  box.innerHTML = `
    <button class="notice-back" onclick="backNoticeList()">목록으로</button>
    <div class="notice-detail-title">${escapeHtml(post.title || "제목 없음")}</div>
    <div class="notice-detail-meta">작성일 ${formatDateTime(post.created_at)}</div>
    <div class="notice-detail-content">${escapeHtml(post.content || "")}</div>
    ${imgs ? `<div class="notice-images">${imgs}</div>` : ""}
    <div class="notice-actions">
      <button class="notice-vote-btn good" onclick="voteNotice('like')">👍 좋아요 ${post.like_count || 0}</button>
      <button class="notice-vote-btn bad" onclick="voteNotice('dislike')">👎 싫어요 ${post.dislike_count || 0}</button>
      <button class="mini-action gray" onclick="deleteNoticePost(${post.id})">공지 삭제</button>
    </div>
    <div class="notice-comment-box">
      <div class="notice-comment-title">댓글</div>
      <div>${commentHtml}</div>
      <div class="notice-comment-form">
        <input id="noticeCommentPin" maxlength="4" inputmode="numeric" placeholder="개인비번 4자리">
        <textarea id="noticeCommentContent" placeholder="댓글을 입력하세요"></textarea>
        <button class="normal-btn" onclick="saveNoticeComment()">등록</button>
      </div>
    </div>
  `;
}

function backNoticeList(){
  currentNoticeId = null;
  document.getElementById("noticeListView").style.display="block";
  document.getElementById("noticeDetailView").style.display="none";
  loadNoticeList();
}

async function uploadNoticeFile(file){
  if(!file) return null;
  if(!validateNoticeImage(file)) return null;
  const ext = file.type === "image/png" ? "png" : "jpg";
  const fileName = `notice_${Date.now()}_${Math.random().toString(36).slice(2)}.${ext}`;
  const { error } = await db.storage.from("liquid-files").upload(fileName, file, { cacheControl:"3600", upsert:false });
  if(error){
    alert("공지 이미지 업로드 실패: " + error.message);
    return null;
  }
  const { data } = db.storage.from("liquid-files").getPublicUrl(fileName);
  return data.publicUrl;
}

async function saveNoticePost(){
  const adminPw = document.getElementById("noticeAdminPw").value.trim();
  const title = document.getElementById("noticeTitle").value.trim();
  const content = document.getElementById("noticeContent").value.trim();
  const f1 = document.getElementById("noticeFile1").files[0];
  const f2 = document.getElementById("noticeFile2").files[0];
  const f3 = document.getElementById("noticeFile3").files[0];

  if(!adminPw) return alert("운영진 비밀번호를 입력해주세요.");
  if(!title) return alert("제목을 입력해주세요.");
  if(!content) return alert("내용을 입력해주세요.");
  if(!validateNoticeImage(f1) || !validateNoticeImage(f2) || !validateNoticeImage(f3)) return;

  const file1_url = await uploadNoticeFile(f1);
  const file2_url = await uploadNoticeFile(f2);
  const file3_url = await uploadNoticeFile(f3);

  const { data, error } = await db.rpc("liquid_notice_create_post", {
    p_admin_pw: adminPw,
    p_title: title,
    p_content: content,
    p_file1_url: file1_url,
    p_file2_url: file2_url,
    p_file3_url: file3_url
  });

  if(error) return alert("공지 등록 실패: " + error.message);

  alert("공지사항이 등록되었습니다.");
  document.getElementById("noticeAdminPw").value="";
  document.getElementById("noticeTitle").value="";
  document.getElementById("noticeContent").value="";
  document.getElementById("noticeFile1").value="";
  document.getElementById("noticeFile2").value="";
  document.getElementById("noticeFile3").value="";
  document.getElementById("noticeWriteModal").style.display="none";

  if(document.getElementById("noticeModal").style.display === "flex") loadNoticeList();
}

async function saveNoticeComment(){
  const pin = document.getElementById("noticeCommentPin").value.trim();
  const content = document.getElementById("noticeCommentContent").value.trim();
  if(!/^\d{4}$/.test(pin)) return alert("댓글 작성시 개인비번 숫자 4자리를 입력해주세요.");
  if(!content) return alert("댓글 내용을 입력해주세요.");

  const { error } = await db.rpc("liquid_notice_create_comment", {
    p_post_id: currentNoticeId,
    p_comment_pin: pin,
    p_content: content
  });

  if(error) return alert("댓글 등록 실패: " + error.message);
  await loadNoticeDetail();
}

async function voteNotice(voteType){
  const { error } = await db.rpc("liquid_notice_vote", {
    p_post_id: currentNoticeId,
    p_voter_key: getNoticeVisitorKey(),
    p_vote_type: voteType
  });
  if(error){
    const msg = error.message || "투표 실패";
    if(msg.includes("already")) return alert("좋아요/싫어요는 하루에 한 번만 누를 수 있습니다.");
    return alert("투표 실패: " + msg);
  }
  await loadNoticeDetail();
}

async function deleteNoticePost(id){
  const pw = prompt("운영진 비밀번호를 입력하세요.");
  if(pw !== "8282") return alert("비밀번호가 틀렸습니다.");
  if(!confirm("공지사항을 삭제할까요?")) return;

  const { error } = await db.rpc("liquid_notice_delete_post", { p_admin_pw: pw, p_post_id: id });
  if(error) return alert("삭제 실패: " + error.message);
  alert("삭제되었습니다.");
  backNoticeList();
}

async function deleteNoticeComment(id){
  const pw = prompt("운영진 비밀번호를 입력하세요.");
  if(pw !== "8282") return alert("비밀번호가 틀렸습니다.");
  if(!confirm("댓글을 삭제할까요?")) return;

  const { error } = await db.rpc("liquid_notice_delete_comment", { p_admin_pw: pw, p_comment_id: id });
  if(error) return alert("댓글 삭제 실패: " + error.message);
  await loadNoticeDetail();
}

function escapeHtml(text){
  return String(text)
    .replaceAll("&","&amp;")
    .replaceAll("<","&lt;")
    .replaceAll(">","&gt;")
    .replaceAll('"',"&quot;")
    .replaceAll("'","&#039;");
}
</script>
